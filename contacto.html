<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equipo 2 — Contáctanos</title>
  <link rel="stylesheet" href="estilos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">EQUIPO 2</div>
      <nav class="nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="contacto.html" class="nav-link active">Contáctanos</a>
      </nav>
    </div>
  </header>

  <main class="contact-main">
    <div class="contact-box">
      <p class="eyebrow">Estamos aquí</p>
      <h1 class="headline contact-headline">CONTÁCTANOS</h1>
      <p class="body-text contact-intro">
        Cuéntanos sobre tu proyecto. Nos pondremos en contacto contigo en menos de 24 horas.
      </p>
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" placeholder="Tu nombre completo" />
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-input" placeholder="correo@ejemplo.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Mensaje</label>
        <textarea class="form-input form-textarea" placeholder="Describe tu proyecto o consulta..."></textarea>
      </div>
      <button class="cta-btn send-btn">Enviar mensaje →</button>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-brand">EQUIPO 2 © 2026</span>
    </div>
  </footer>

</body>
</html>
